spring:
  application:
    name: vault-bank
  
  # Database Configuration using environment variables with fallbacks
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:vault_bank}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Spring Data JPA & Hibernate settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # Apache Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: vault-bank-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.vaultbank.dto.event,com.vaultbank.event,com.vaultbank.dto.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: ${PORT:8081}

# Custom Application Settings for JWT (using Base64 encoded 256-bit safe secret key by default)
app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1hbmQtc3VwZXItbG9uZy1zZWNyZXQta2V5LWZvci12YXVsdC1iYW5rLXByb2plY3Qtc3ByaW5nLWJvb3QtM2Utand0LWF1dGg=}
    # 15 minutes (in milliseconds)
    accessTokenExpirationMs: 900000
    # 7 days (in milliseconds)
    refreshTokenExpirationMs: 604800000

# Swagger / Springdoc OpenAPI configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging configuration
logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
    com.vaultbank: DEBUG
